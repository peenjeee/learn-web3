[profile.default]
src = "src"
out = "out"
libs = ["lib"]
gas_price = 3000000000   # 3 gwei (default buat broadcast). Biar tx BSC testnet gak nyangkut; pakai --legacy pas deploy.
ignored_error_codes = ["block-timestamp"]

# Nilai sensitif diambil dari .env (lihat .env.example):
#   BSC_TESTNET_RPC   -> RPC endpoint (dipakai --rpc-url bsc_testnet)
#   ETHERSCAN_API_KEY -> verify kontrak (Etherscan V2, satu key semua chain)
#   PRIVATE_KEY       -> signer, dibaca di script deploy: vm.envUint("PRIVATE_KEY")
[rpc_endpoints]
bsc_testnet = "${BSC_TESTNET_RPC}"

[etherscan]
bsc_testnet = { key = "${ETHERSCAN_API_KEY}", chain = 97 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
